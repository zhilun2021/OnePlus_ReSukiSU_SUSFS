    - name: Apply NTSync Patch
      shell: bash
      if: ${{ env.OP_NTSYNC == 'true' }}
      run: |
        set -euo pipefail
        echo "::group::Apply NTSync patch"
        cd "$COMMON_KERNEL_FOLDER"
        NTSYNC_FOLDER="$KERNEL_PATCHES_FOLDER/common/ntsync"
        GKI_KEY="${ANDROID_VER}-${KERNEL_VER}"
        BRANCH_SUFFIX=$(basename "$OP_BRANCH")
        
        if [[ "$OP_MODEL" == "OP10r" ]] && [[ "$OP_OS_VERSION" == "OOS15" ]]; then
          NTSYNC_PATCH="$NTSYNC_FOLDER/ntsync_compat_android12-5.10_OOS14.patch"
          if [ ! -f "$NTSYNC_PATCH" ]; then
            echo "::error::NTSync compat patch not found for ${OP_MODEL}: $(basename $NTSYNC_PATCH)"
            exit 1
          fi
        elif [ -f "$NTSYNC_FOLDER/ntsync_compat_${GKI_KEY}_${OP_OS_VERSION}.patch" ]; then
          NTSYNC_PATCH="$NTSYNC_FOLDER/ntsync_compat_${GKI_KEY}_${OP_OS_VERSION}.patch"
        elif [ -f "$NTSYNC_FOLDER/ntsync_compat_${GKI_KEY}.patch" ]; then
          NTSYNC_PATCH="$NTSYNC_FOLDER/ntsync_compat_${GKI_KEY}.patch"
        else
          echo "::error::NTSync patch not found for ${GKI_KEY} (Model: ${OP_MODEL}, OOS: ${OP_OS_VERSION})"
          exit 1
        fi
        
        echo "Using patch: $(basename $NTSYNC_PATCH)"
        if [ "$ANDROID_VER" = "android16" ] && [ "$KERNEL_VER" = "6.12" ]; then
          echo "Removing pre-existing ntsync files for android16-6.12"
          rm -f include/uapi/linux/ntsync.h
          rm -f drivers/misc/ntsync.c
        fi
        
        echo "Patching $(basename $NTSYNC_PATCH)!"
        if ! patch -p1 --forward < "$NTSYNC_PATCH"; then
          echo "::warning::NTSync compat patch did not apply cleanly. Checking for manual fallback..."
          REJ_COUNT=$(find . -name "*.rej" | wc -l)
          if [ "$REJ_COUNT" -eq 1 ] && [ -f include/linux/lockdep.h.rej ]; then
            echo "Only lockdep.h failed. Applying lockdep.h changes manually..."
            # Add missing lockdep macros if not already present
            grep -q '#define lockdep_assert(c)' include/linux/lockdep.h || \
              sed -i '/#define lockdep_is_held_type(l, r)/a\#define lockdep_assert(c)\t\t\tdo { } while (0)' include/linux/lockdep.h
            grep -q '#define lockdep_assert_once(c)' include/linux/lockdep.h || \
              sed -i '/#define lockdep_assert(c)/a\#define lockdep_assert_once(c)\t\t\tdo { } while (0)' include/linux/lockdep.h
            grep -q '#define lockdep_assert_not_held(l)' include/linux/lockdep.h || \
              sed -i '/#define lockdep_assert_held(l)/a\#define lockdep_assert_not_held(l)\t\tdo { (void)(l); } while (0)' include/linux/lockdep.h
            grep -q '#define lockdep_assert_none_held_once()' include/linux/lockdep.h || \
              sed -i '/#define lockdep_assert_held_once(l)/a\#define lockdep_assert_none_held_once()\tdo { } while (0)' include/linux/lockdep.h
            rm -f include/linux/lockdep.h.rej
            echo "✅ lockdep.h manual fallback applied"
          else
            echo "::error::$(basename $NTSYNC_PATCH) patch failed. Dumping all .rej files:"
            find . -name "*.rej" -exec echo "=== {} ===" \; -exec cat {} \;
            exit 1
          fi
        fi
        echo "Patching ntsync_base!"
        if ! patch -p1 --forward < "$NTSYNC_FOLDER/ntsync_base.patch"; then
          echo "::error::ntsync_base patch failed. Dumping all .rej files:"
          find . -name "*.rej" -exec echo "=== {} ===" \; -exec cat {} \;
          exit 1
        fi
        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" <<EOF
        CONFIG_NTSYNC=y
        EOF
        echo "✅ NTSync patch applied"
        echo "::endgroup::"

