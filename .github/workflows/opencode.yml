name: opencode

on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间上午8点 (UTC 0:00) 触发
  workflow_dispatch: # 添加手动触发
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

jobs:
  check-upstream:
    name: Check Upstream for Updates
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for updates
        id: check
        run: |
          git remote add upstream https://github.com/WildKernels/OnePlus_KernelSU_SUSFS.git
          git fetch upstream main
          LOCAL_COMMIT=$(git rev-parse HEAD)
          UPSTREAM_COMMIT=$(git rev-parse upstream/main)
          echo "Local commit: $LOCAL_COMMIT"
          echo "Upstream commit: $UPSTREAM_COMMIT"
          
          # Check if upstream is ahead
          if ! git merge-base --is-ancestor $UPSTREAM_COMMIT $LOCAL_COMMIT; then
            echo "Upstream has new commits."
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new updates from upstream."
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

  opencode:
    name: Run Opencode Agent
    needs: [check-upstream]
    # 如果是定时或手动触发，只有在检查到有更新时才运行；否则如果是评论触发则直接运行
    if: |
      always() && 
      (
        (needs.check-upstream.result == 'success' && needs.check-upstream.outputs.has_updates == 'true') ||
        (github.event_name == 'issue_comment' && (contains(github.event.comment.body, ' /oc') || startsWith(github.event.comment.body, '/oc') || contains(github.event.comment.body, ' /opencode') || startsWith(github.event.comment.body, '/opencode'))) ||
        (github.event_name == 'pull_request_review_comment' && (contains(github.event.comment.body, ' /oc') || startsWith(github.event.comment.body, '/oc') || contains(github.event.comment.body, ' /opencode') || startsWith(github.event.comment.body, '/opencode')))
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Set to false to avoid "Duplicate header: Authorization" conflict with GITHUB_TOKEN in env
          persist-credentials: false

      - name: Prepare Prompt
        id: prep
        run: |
          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            cat << 'EOF' > prompt.txt
          Check for upstream repository modifications from https://github.com/WildKernels/OnePlus_KernelSU_SUSFS.
          If there are new updates, YOU MUST integrate them. To avoid authentication issues with the upstream repository, use the following command to fetch:
          `git fetch --no-tags https://github.com/WildKernels/OnePlus_KernelSU_SUSFS.git main:upstream-main`
          Then, use standard `git merge upstream-main` into the current branch.

          STRICT WORKFLOW RULE (CRITICAL): 
          - You must remain on the CURRENT branch. Do not switch to or create any other branches.
          - STRICT SECURITY RULE: Under NO circumstances are you allowed to modify the 'main' branch or any other existing permanent branches directly. 
          - Do not attempt to manually create Pull Requests or push code using external command-line tools.
          - WHY: The system manages a specialized temporary branch and the necessary authentication. Deviating from the current branch or attempting to modify protected branches will cause the automation to fail and is a violation of security protocols.
          - YOUR TASK: Simply perform the 'git merge' and any required file modifications on the CURRENT temporary branch. Stay exactly where you are.

          WARNING: Do NOT run `git merge --abort` and switch to manually checking out files (e.g. `git checkout upstream/main -- configs/`)! You MUST preserve the upstream Git history and commit signatures. DO NOT squash everything into a single manual commit!
          After the merge is successfully committed to the current branch, simply finish your task. The system will automatically handle the push and Pull Request creation. YOU MUST STRICTLY FOLLOW THESE MERGE GUIDELINES:
          
          # Project Maintenance & Upstream Sync Guidelines (OnePlus_KernelSU_SUSFS)
          This project is a fork of WildKernels, but maintains independence in core logic and Root solution selection. You must strictly adhere to the following guidelines.

          ## 🚫 Strictly Forbidden (DO NOT BRING THESE IN)
          1. Reject Normalize Scheme
          * Background: Upstream introduced a matrix generation logic based on `ksu_options_normalized`.
          * Requirement: PROHIBITED to introduce any code containing the keyword `normalized` in `.github/workflows/build-kernel-release.yml`.
          * Adherence: Maintain the existing `set-matrix` logic, which manually selects the distribution mode via `inputs.ksu_type`.
          2. Reject KernelSU-Next (KSUN) and WildKSU
          * Background: We have shifted our core Root solution to ReSukiSU.
          * Requirement: PROHIBITED to add `KSUN` or `WildKSU` to the `ksu_type` options in `.github/actions/action.yml` (or related build scripts).
          * Adherence: The core Root solution must only retain `KSU` and `ReSukiSU`.
          3. Preserve Original Telegram Channel Links
          * Requirement: PROHIBITED to replace our Telegram links with the upstream's links.
          * Adherence: You must ensure that our original Telegram links (`https://t.me/huangdihd` and `https://t.me/huangdihd_wildkernel`) are kept intact in `README.md`.
          4. Preserve AnyKernel3 Repository
          * Requirement: PROHIBITED to change the AnyKernel3 clone URL or repository reference to upstream's.
          * Adherence: 
            - Ensure the AnyKernel3 URL in `.github/actions/build-kernel/action.yml` remains `https://github.com/huangdihd/AnyKernel3`.
            - Ensure any AnyKernel3 or "wild" remote fetch URLs in ALL XML files under `manifests/` directory point to `https://github.com/huangdihd`.
          5. Reject Upstream Kernel Suffix (WILD)
          * Requirement: PROHIBITED to use `-OP-WILD` or `OP-WILD` anywhere.
          * Adherence: 
            - Ensure the fallback logic in `.github/actions/build-kernel/action.yml` does not use `-OP-WILD`.
            - Ensure that the `"uname"` field in ANY JSON file inside the `configs/` directory is set to `"OP-RESUKISU"`. If upstream adds a new config with `"uname": "OP-WILD"`, you MUST change it to `"OP-RESUKISU"`.
          6. Preserve USB DWC3 & OTG Support
          * Requirement: PROHIBITED to remove the "Add USB DWC3 & OTG Support" step.
          * Adherence: You must ensure that the step named "Add USB DWC3 & OTG Support" in `.github/actions/build-kernel/action.yml` is kept intact. Do not delete or disable it during merge.
          7. Preserve Correct ReSukiSU Repository
          * Background: The correct ReSukiSU repository is `https://github.com/ReSukiSU/ReSukiSU`.
          * Requirement: PROHIBITED to change the ReSukiSU repository URL or references to any other fork (e.g., do NOT use `TheWildJames/ReSukiSU`).
          * Adherence: Ensure all ReSukiSU download/setup scripts and repository owner/name variables in `.github/actions/build-kernel/action.yml`, `.github/workflows/build-kernel-release.yml`, and `README.md` point to the official `ReSukiSU/ReSukiSU`.

          ## ✅ Allowed to Sync (FOCUS ON THESE)
          * Device Configurations: New device JSON files in the `configs/` directory (e.g., OP13, OP15, etc.).
          * New Features: Functional patches like `lxc_ds` (Droidspaces/LXC support), `HMBIRD` optimizations, etc.
          * Performance Optimizations: Logic introduced by upstream in the `set-op-model` task to parse hashes via GraphQL API.
          * Compiler Updates: Path optimizations or version updates for Clang/Rust toolchains.

          ## 🛠️ Post-Sync Checklist
          Before submitting the PR, audit the repository:
          1. Audit ksu_type: Ensure `grep "KSUN" .github/actions/action.yml` or `build-kernel-release.yml` returns no matches.
          2. Audit Normalize logic: Ensure `grep "normalized" .github/workflows/build-kernel-release.yml` returns no matches.
          3. Audit ReSukiSU Integrity: Ensure the "Add ReSukiSU" steps in `action.yml` have not been deleted, and the project description in `README.md` has not been overwritten by upstream.
          4. Audit Telegram Links: Verify that the Telegram links in `README.md` still point to `https://t.me/huangdihd` and `https://t.me/huangdihd_wildkernel`.
          5. Audit USB DWC3: Verify that the "Add USB DWC3 & OTG Support" step in `action.yml` still exists.
          6. Audit AnyKernel3 Manifests: Verify that `manifests/**/*.xml` files do not point to the upstream WildKernels AnyKernel3 repo.

          ## ⚠️ Abort Condition (IMPORTANT)
          If you detect that upstream has not fully completed their modification (e.g., missing files, broken logic), actively ABANDON this sync. Do not create a PR, or close it, and leave a comment explaining what was incomplete.
          EOF
            
            {
              echo 'prompt<<EOF'
              cat prompt.txt
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "prompt=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          XIAOMI_API_KEY: ${{ secrets.XIAOMI_API_KEY }}
          # Using GITHUB_TOKEN as it was present during the previous successful run.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: xiaomi-token-plan-cn/mimo-v2-pro
          prompt: ${{ steps.prep.outputs.prompt }}

  set-matrix:
    name: Generate Test Matrix
    if: github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'opencode/')
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Generate build matrix
        id: set-matrix
        shell: bash
        run: |
          echo "[" > matrix.json
          mapfile -t all_json_files < <(find configs/ -name "*.json" -print0 | xargs -0 -n1)
          for i in "${!all_json_files[@]}"; do
            file="${all_json_files[$i]}"
            if [ -f "$file" ]; then
              jq -r '.' "$file" >> matrix.json
              if [ $((i+1)) -lt ${#all_json_files[@]} ]; then
                echo "," >> matrix.json
              fi
            fi
          done
          echo "]" >> matrix.json
          
          # Only test a small subset or specific required matrix logic.
          # Here we test ALL configs found.
          filtered=$(jq -c '.' matrix.json)
          wrapped=$(jq -n --argjson items "$filtered" '{ include: $items }')
          echo "matrix=$(jq -c . <<< "$wrapped")" >> "$GITHUB_OUTPUT"

  test-build:
    name: Build (${{ matrix.model }}, ${{ matrix.os_version }}, ${{ matrix.kernel_version }})
    needs: [set-matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Minimal Dependencies
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git curl ca-certificates build-essential clang lld flex bison \
            libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
            libxml2-utils rsync unzip dwarves file python3 bc dos2unix kmod libdw-dev elfutils pigz jq

      - name: Prepare op_config_json
        id: prepare_config
        shell: bash
        run: |
          echo "config_json=$(jq -nc --argjson m '${{ toJSON(matrix) }}' '$m')" >> "$GITHUB_OUTPUT"

      - name: Test Build Kernel
        id: build
        uses: ./.github/actions/build-kernel
        with:
          op_config_json: ${{ steps.prepare_config.outputs.config_json }}
          ksu_type: "ReSukiSU"
          ksu_branch_or_hash: "main"
          # Mock SUSFS branch/hash based on android version since it's just a test
          susfs_commit_hash_or_branch: "gki-${{ matrix.android_version }}-${{ matrix.kernel_version }}"
          optimize_level: "O2"
          build_timestamp: ""
          clean: true
          debug: false
          github_token: ${{ secrets.GITHUB_TOKEN }}

  report-test-result:
    name: Report and Auto-Fix
    needs: [test-build]
    if: always() && github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'opencode/')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare TG Message
        id: prep-msg
        if: always()
        shell: bash
        run: |
          TEST_BUILD_RESULT="${{ needs.test-build.result }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          
          EMOJI="✅"
          if [ "$TEST_BUILD_RESULT" != "success" ]; then EMOJI="❌"; fi
          
          {
            echo "msg<<EOF"
            echo "${EMOJI} <b>Opencode PR Test Build Finished</b>"
            echo "━━━━━━━━━━━━━━━━━━"
            echo "<b>Result:</b> <code>${TEST_BUILD_RESULT}</code>"
            echo "<b>PR:</b> <a href=\"${PR_URL}\">#${PR_NUM}</a>"
            echo "━━━━━━━━━━━━━━━━━━"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send TG Progress
        if: always()
        continue-on-error: true
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          # Use dedicated TG_TEST_CHAT_ID for test builds, fallback to general TG_CHAT_ID
          TG_CHAT_ID: ${{ secrets.TG_TEST_CHAT_ID || secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "Telegram secrets not configured!"
            exit 0
          fi
          
          MSG_TEXT="${{ steps.prep-msg.outputs.msg }}"
          
          # Split TG_CHAT_ID by comma or space
          IFS=' ,' read -r -a CHAT_IDS <<< "$TG_CHAT_ID"
          
          for ID in "${CHAT_IDS[@]}"; do
            if [ -z "$ID" ]; then continue; fi
            PAYLOAD=$(jq -n \
              --arg chat_id "$ID" \
              --arg text "$MSG_TEXT" \
              '{
                chat_id: $chat_id,
                parse_mode: "HTML",
                disable_web_page_preview: true,
                text: $text
              }')
            
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" > /dev/null
          done

      - name: Run opencode to fix build
        if: needs.test-build.result != 'success'
        uses: anomalyco/opencode/github@latest
        env:
          XIAOMI_API_KEY: ${{ secrets.XIAOMI_API_KEY }}
          # Use GH_PAT if available (to trigger recursive builds), fallback to GITHUB_TOKEN
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        with:
          model: xiaomi-token-plan-cn/mimo-v2-pro
          prompt: "The matrix test build failed for one or more devices. Please check the GitHub Actions logs for the failed 'test-build' jobs to identify the compilation errors. Fix the code to resolve these compilation errors and push the updates to the PR branch. \n\nIMPORTANT RE-TRIGGER RULE: Even if you find no bugs to fix or your investigation results in no code changes, YOU MUST push a commit to the PR branch to re-trigger the verification. Use `git commit --allow-empty -m 'chore: trigger re-verification'` if necessary. Verification MUST run again.\n\nIF YOU ENCOUNTER A TOOLCHAIN CACHE ERROR (e.g., '[FATAL ERROR] Toolchain AnyKernel3... NOT FOUND in GitHub Release cache!'):\nThis means a newly added toolchain hasn't been mirrored to GitHub releases yet. You MUST manually trigger the mirror workflow for your PR branch using the following command in your terminal:\n`gh workflow run mirror-toolchains.yml --ref <your-pr-branch-name>`\nWait a minute for it to complete, and then trigger a new test build by pushing an empty commit."

      - name: Force Rerun on Sync (Fallback)
        # 即使 Agent 忘了推空提交，我们也在这里手动尝试重新触发失败的任务（需要 GH_TOKEN 权限）
        if: always() && needs.test-build.result != 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 尝试通过 CLI 重新运行失败的任务，作为最后的保险
          gh run rerun ${{ github.run_id }} --failed || echo "Rerun skipped or failed"

      - name: Fail the workflow
        if: needs.test-build.result != 'success'
        run: exit 1
